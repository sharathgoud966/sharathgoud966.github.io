<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharath Portfolio</title>

<style>
html { scroll-behavior: smooth; }
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  z-index:1000;
}
nav a {
  color:white;
  text-decoration:none;
  font-size:14px;
  letter-spacing:2px;
}

/* SECTIONS */
section {
  min-height:100vh;
  padding:100px 40px;
}

/* HOME */
#home {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* WORK */
#work {
  background:#111;
}

/* POSTERS */
#posters {
  background:#080808;
}

.poster-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.poster-card {
  background:#111;
  height:350px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #222;
  transition:0.3s;
}

.poster-card:hover {
  transform:scale(1.05);
  border-color:#e8c97e;
}

/* CONTACT */
#contact {
  background:#111;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#work">Work</a>
  <a href="#posters">Poster Series</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HOME -->
<section id="home">
  <div>
    <h1>Sharath Portfolio</h1>
    <a href="#posters" style="font-size:16px;">View Poster Series ↓</a>
  </div>
</section>

<!-- WORK -->
<section id="work">
  <h2>Work Section</h2>
  <p>Your existing work content here...</p>
</section>

<!-- POSTER SERIES -->
<section id="posters">
  <h2>Poster Series</h2>

  <div class="poster-grid">
    <div class="poster-card">Poster 1</div>
    <div class="poster-card">Poster 2</div>
    <div class="poster-card">Poster 3</div>
    <div class="poster-card">Poster 4</div>
    <div class="poster-card">Poster 5</div>
    <div class="poster-card">Poster 6</div>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Your contact section...</p>
</section>

</body>
</html>
